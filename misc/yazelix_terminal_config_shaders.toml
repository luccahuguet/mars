confirm-before-quit = false

[renderer]
backend = "Webgpu"
custom-shader = [
  "@yazelix_terminal_shader_dir@/cursor_trail_dusk.glsl",
  "@yazelix_terminal_shader_dir@/generated_effects/sweep.glsl",
  "@yazelix_terminal_shader_dir@/generated_effects/rectangle_boom.glsl",
]

[window]
decorations = "Disabled"

[cursor]
blinking = true
blinking-interval = 650

[effects]
trail-cursor = true

@yazelix_terminal_fonts@
