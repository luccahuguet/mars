# Rio-compatible Yazelix dogfood config.
# Keep this content identical in the private Rio and Mars config roots
# until Mars has a measured reason to diverge from Rio config behavior.

confirm-before-quit = false
scrollback-history-limit = 0
force-theme = "dark"
enable-scroll-bar = false

[shell]
program = "yzx"
args = ["start"]

[window]
width = 960
height = 620
decorations = "Disabled"
opacity = 0.78
opacity-cells = true

[panel]
margin = [0.0]
padding = [0.0]
border-width = 0.0

[fonts]
family = "FiraCode Nerd Font"
size = 18.0

[colors]
background = "#111416"
foreground = "#eeeeec"
black = "#000000"
red = "#cd0000"
green = "#00cd00"
yellow = "#cdcd00"
blue = "#1093f5"
magenta = "#cd00cd"
cyan = "#00cdcd"
white = "#faebd7"
light-black = "#404040"
light-red = "#ff0000"
light-green = "#00ff00"
light-yellow = "#ffff00"
light-blue = "#11b5f6"
light-magenta = "#ff00ff"
light-cyan = "#00ffff"
light-white = "#ffffff"

[navigation]
mode = "Plain"
